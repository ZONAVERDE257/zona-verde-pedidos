<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZONA VERDE | Felicidad Saludable</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="encabezado">

    <img src="logo.png.png" alt="Zona Verde" class="logo">

    <h1>ZONA VERDE</h1>

    <p>Felicidad Saludable</p>

</header>
    <h1>🥗 ZONA VERDE</h1>
    <h2>Felicidad Saludable</h2>
    <p>Alimentación fresca y saludable</p>
</header>

<main>
    <section id="menu">
        <p>Cargando productos...</p>
    </section>
</main>
<section id="carrito">
    <h2>🛒 Mi pedido</h2>

    <div id="listaCarrito">
        <p>No has agregado productos.</p>
    </div>

    <h3>Total: <span id="total">$0</span></h3>

    <input
        type="text"
        id="cliente"
        placeholder="Nombre del cliente">

    <input
        type="tel"
        id="telefono"
        placeholder="Teléfono">

    <input
        type="text"
        id="direccion"
        placeholder="Dirección">

    <textarea
        id="observaciones"
        placeholder="Observaciones"></textarea>

    <button id="btnWhatsapp">
        📲 Enviar pedido por WhatsApp
    </button>
</section>
<footer>
    <p>© ZONA VERDE - Felicidad Saludable</p>
</footer>

<script src="script.js"></script>

</body>
</html>
