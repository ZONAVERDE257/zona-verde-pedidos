<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Administrador | ZONA VERDE</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🥗 ZONA VERDE</h1>
<h2>Panel Administrador</h2>
<p>Felicidad Saludable</p>
</header>


<section>

<h2>➕ Agregar Producto</h2>

<label>Nombre del producto</label>
<br>
<input id="nombre" type="text" placeholder="Ej: Bowl Camarones">

<br><br>

<label>Precio</label>
<br>
<input id="precio" type="number" placeholder="Ej: 37000">

<br><br>

<label>Categoría</label>
<br>

<select id="categoria">
<option>Almuerzos</option>
<option>Bowls</option>
<option>Desayunos</option>
<option>Helados</option>
</select>

<br><br>

<label>Descripción</label>
<br>

<textarea id="descripcion" placeholder="Descripción del producto"></textarea>

<br><br>

<button onclick="guardarProducto()">
➕ GUARDAR PRODUCTO
</button>

</section>


<section>

<h2>Productos creados</h2>

<div id="lista"></div>

</section>


<script src="admin.js"></script>

</body>
</html>
